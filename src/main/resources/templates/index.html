<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<header th:replace="~{header :: header}"></header>.
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Домашня кондитерська - Cake House">
  <title>Cake House - Home Bakery</title>
  <link rel="stylesheet" th:href="@{/css/globals.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;700&family=Love+Light&display=swap" rel="stylesheet">
</head>
<body>

<main class="main screen">
  <section class="hero">
    <div class="hero-text">
      <h2 th:text="${heroSubtitle}">КОНДИТЕРСЬКА</h2>
      <h1 th:text="${heroTitle}">BAKERY</h1>
      <div class="hero-subtitle">HOME</div>
    </div>
    <div class="hero-image">
      <img src="/img/1.png" alt="Картинка" />
    </div>
  </section>
</main>

<footer class="footer">
  <p>&copy; 2025 Cake House. Всі права захищені.</p>
  <div class="socials">
    <span>Instagram</span>
    <span>Facebook</span>
    <span>Telegram</span>
  </div>
</footer>

</body>
</html>
